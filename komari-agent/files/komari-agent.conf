# Komari Agent UCI Configuration
#
# This file is preserved during sysupgrade (keep settings).
# The service will NOT start unless 'enabled' is 1 AND both
# 'endpoint' and 'token' are configured.

config komari-agent 'main'
	# Master switch - set to 1 to enable the service
	option enabled '0'

	# Panel URL (REQUIRED) - e.g., https://panel.example.com
	option endpoint ''

	# Authentication token (REQUIRED)
	option token ''

	# Collection interval in seconds.
	# Leave empty to use agent's built-in default (1s).
	# Only passed to the agent when explicitly set.
	option interval ''

	# Network statistics monthly reset day (1-31).
	# Leave empty to use agent's built-in default (1).
	# Only passed to the agent when explicitly set.
	option month_rotate ''

	# --- Optional feature flags (0 = disabled, 1 = enabled) ---

	# Disable remote Web SSH control
	option disable_web_ssh '0'

	# Ignore unsafe TLS certificates
	option ignore_unsafe_cert '0'

	# Get IP address from network interface
	option get_ip_from_nic '0'

	# Disable automatic agent updates
	option disable_auto_update '0'

	# Include buffer/cache memory in reporting
	option memory_include_cache '0'

	# Enable detailed GPU monitoring
	option gpu '0'

	# --- Network interface filters (UCI list, comma-separated for agent) ---
	# Leave empty to monitor all interfaces.
	# Example:
	#   list include_nics 'eth0'
	#   list include_nics 'wlan0'

	# --- Mount point filters (UCI list, semicolon-separated for agent) ---
	# Leave empty to monitor all mount points.
	# Example:
	#   list include_mountpoint '/var'
